{% extends "base.html" %}
{% block title %}{% if post %}Edit: {{ post.title }}{% else %}New Post{% endif %} — Marginalia{% endblock %}

{% block content %}
<div class="editor-page">
  <header class="editor-header">
    <a href="{{ url_for('index') }}" class="back-link">← Cancel</a>
    <h1>{% if post %}Edit Post{% else %}New Post{% endif %}</h1>
  </header>

  <form method="POST" class="editor-form">
    <div class="field">
      <label for="title">Title</label>
      <input
        type="text"
        id="title"
        name="title"
        value="{{ form.title or '' }}"
        placeholder="What's this post about?"
        autofocus
        required
      />
    </div>

    <div class="field">
      <label for="content">Content</label>
      <textarea
        id="content"
        name="content"
        rows="18"
        placeholder="Start writing… Separate paragraphs with a blank line."
        required
      >{{ form.content or '' }}</textarea>
      <p class="field-hint">Paragraphs are separated by blank lines.</p>
    </div>

    <div class="editor-actions">
      <button type="submit" class="btn-primary">
        {% if post %}Save Changes{% else %}Publish Post{% endif %}
      </button>
      <a href="{{ url_for('index') }}" class="btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
